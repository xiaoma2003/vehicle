<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆调度AI算法评测系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <h1>🚂 车辆调度AI算法评测系统</h1>
            </div>
            <div class="header-actions">
                <span id="currentBatch" class="batch-info">批次: 未开始</span>
                <button onclick="showStatistics()" class="btn btn-secondary">📊 统计</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="map">🗺️ 地图</button>
                    <button class="tab-btn" data-tab="tasks">📋 任务</button>
                    <button class="tab-btn" data-tab="locomotives">🚃 机车</button>
                    <button class="tab-btn" data-tab="scheduling">⚙️ 调度</button>
                    <button class="tab-btn" data-tab="comparison">📈 对比</button>
                    <button class="tab-btn" data-tab="history">📚 历史</button>
                    <button class="tab-btn" data-tab="logs">📝 日志</button>
                </div>
            </aside>

            <main class="content-area">
                <div id="tab-map" class="tab-content active">
                    <div class="map-container">
                        <div class="map-toolbar">
                            <h3>动态地图展示</h3>
                            <div class="map-controls">
                                <select id="mapStrategySelect">
                                    <option value="cpsat">CP-SAT 基准</option>
                                    <option value="greedy">贪心算法</option>
                                    <option value="genetic">遗传算法</option>
                                    <option value="simulated_annealing">模拟退火</option>
                                </select>
                                <button id="mapRunBtn" onclick="mapRunSchedule()" class="btn btn-primary">▶ 执行调度</button>
                                <button id="mapPauseBtn" onclick="mapPauseSchedule()" class="btn btn-warning" disabled>⏸ 暂停</button>
                                <button id="mapResumeBtn" onclick="mapResumeSchedule()" class="btn btn-success" disabled>▶ 继续</button>
                                <button onclick="addNodeModal()" class="btn btn-info">+ 节点</button>
                                <button onclick="addEdgeModal()" class="btn btn-info">+ 边</button>
                                <button onclick="loadMapConfig()" class="btn btn-info">🔄</button>
                                <select id="directionSelect" onchange="checkDirectionLock()">
                                    <option value="up">上行</option>
                                    <option value="down">下行</option>
                                </select>
                                <span id="directionStatus" class="direction-status">方向: --</span>
                            </div>
                        </div>
                        <canvas id="mapCanvas" class="map-canvas"></canvas>
                        <div class="map-legend">
                            <span class="legend-item"><span class="legend-dot station"></span>车站</span>
                            <span class="legend-item"><span class="legend-dot fuel"></span>加油站</span>
                            <span class="legend-item"><span class="legend-dot charge"></span>充电站</span>
                            <span class="legend-item"><span class="legend-dot material"></span>物料站</span>
                            <span class="legend-item"><span class="legend-dot switch"></span>道岔</span>
                            <span class="legend-item"><span class="legend-line up"></span>上行</span>
                            <span class="legend-item"><span class="legend-line down"></span>下行</span>
                        </div>
                    </div>
                    <div class="vehicle-status-panel">
                        <h3>🚃 车辆实时状态</h3>
                        <div id="vehicleStatusList" class="vehicle-list">
                            <p class="text-muted">暂无车辆数据</p>
                        </div>
                    </div>
                </div>

                <div id="tab-tasks" class="tab-content">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>任务管理</h3>
                            <div>
                                <button onclick="addTaskModal()" class="btn btn-primary">+ 添加任务</button>
                                <button onclick="triggerEmergencyModal()" class="btn btn-danger">🚨 紧急任务</button>
                                <button onclick="boostPriorityModal()" class="btn btn-warning">⬆ 提升优先级</button>
                            </div>
                        </div>
                        <div class="task-filters">
                            <select id="taskTypeFilter" onchange="loadTasks()">
                                <option value="">全部类型</option>
                                <option value="normal">普通任务</option>
                                <option value="temporary">临时任务</option>
                                <option value="emergency">紧急任务</option>
                            </select>
                            <select id="taskStatusFilter" onchange="loadTasks()">
                                <option value="">全部状态</option>
                                <option value="pending">待执行</option>
                                <option value="running">执行中</option>
                                <option value="paused">已暂停</option>
                                <option value="completed">已完成</option>
                            </select>
                        </div>
                        <div id="tasksList" class="data-list">
                            <p class="text-muted">加载中...</p>
                        </div>
                    </div>
                </div>

                <div id="tab-locomotives" class="tab-content">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>机车管理</h3>
                            <div>
                                <button onclick="addLocomotiveModal('electric')" class="btn btn-success">+ 添加电车</button>
                                <button onclick="addLocomotiveModal('diesel')" class="btn btn-warning">+ 添加油车</button>
                            </div>
                        </div>
                        <div class="loco-filters">
                            <select id="locoTypeFilter" onchange="loadLocomotives()">
                                <option value="">全部类型</option>
                                <option value="electric">电动机车</option>
                                <option value="diesel">柴油机车</option>
                            </select>
                        </div>
                        <div id="locomotivesList" class="data-list">
                            <p class="text-muted">加载中...</p>
                        </div>
                    </div>
                </div>

                <div id="tab-scheduling" class="tab-content">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>调度控制</h3>
                        </div>
                        <div class="scheduling-controls">
                            <div class="control-group">
                                <label>选择策略:</label>
                                <select id="strategySelect">
                                    <option value="cpsat">CP-SAT 基准策略</option>
                                    <option value="greedy">贪心算法</option>
                                    <option value="genetic">遗传算法</option>
                                    <option value="simulated_annealing">模拟退火</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label>
                                    <input type="checkbox" id="hotStartCheck"> 热启动（跳过已绑定任务的车辆）
                                </label>
                            </div>
                            <div class="control-group">
                                <button onclick="runSchedule()" class="btn btn-primary btn-large">▶ 执行调度</button>
                                <button onclick="pauseSchedule()" class="btn btn-warning">⏸ 暂停</button>
                                <button onclick="resumeSchedule()" class="btn btn-success">▶ 继续</button>
                            </div>
                        </div>
                        <div id="scheduleResult" class="schedule-result">
                            <p class="text-muted">点击执行调度开始</p>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">
                            <h3>超参数配置</h3>
                            <button onclick="saveHyperParams()" class="btn btn-primary">💾 保存</button>
                        </div>
                        <div id="hyperParamsForm" class="form-grid">
                            <p class="text-muted">加载中...</p>
                        </div>
                    </div>
                </div>

                <div id="tab-comparison" class="tab-content">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>多策略对比</h3>
                            <button onclick="runComparison()" class="btn btn-primary">开始对比</button>
                        </div>
                        <div class="comparison-options">
                            <label><input type="checkbox" class="compare-strategy" value="cpsat" checked> CP-SAT基准</label>
                            <label><input type="checkbox" class="compare-strategy" value="greedy" checked> 贪心算法</label>
                            <label><input type="checkbox" class="compare-strategy" value="genetic" checked> 遗传算法</label>
                            <label><input type="checkbox" class="compare-strategy" value="simulated_annealing" checked> 模拟退火</label>
                        </div>
                        <div id="comparisonResult" class="comparison-result">
                            <p class="text-muted">选择策略后点击开始对比</p>
                        </div>
                    </div>
                </div>

                <div id="tab-history" class="tab-content">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>历史回放</h3>
                            <select id="historyBatchSelect" onchange="loadBatchHistory()">
                                <option value="">选择批次</option>
                            </select>
                        </div>
                        <div class="history-filters">
                            <input type="text" id="historySearch" placeholder="搜索批次ID..." onkeyup="filterHistory()">
                        </div>
                        <div id="historyList" class="data-list">
                            <p class="text-muted">加载中...</p>
                        </div>
                        <div id="historyPagination" class="pagination"></div>
                    </div>
                </div>

                <div id="tab-logs" class="tab-content">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>系统日志</h3>
                            <select id="logLevelFilter" onchange="loadLogs()">
                                <option value="">全部级别</option>
                                <option value="INFO">信息</option>
                                <option value="WARN">警告</option>
                                <option value="ERROR">错误</option>
                            </select>
                        </div>
                        <div id="logsList" class="logs-list">
                            <p class="text-muted">加载中...</p>
                        </div>
                        <div id="logsPagination" class="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modalContainer"></div>

    <script src="/static/js/map.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
